# ==========================================
# Module: _config.fluid.yml
# Purpose: Hexo Theme Fluid 用户配置（覆盖主题默认配置）
# Usage:
#   1) 确保站点 _config.yml 中设置 theme: fluid
#   2) 在此文件中按需覆盖主题配置项（未写的项将沿用主题默认值）
# Example:
#   dark_mode:
#     enable: true
# ==========================================

# 主题暗色模式
dark_mode:
  enable: true
  default: auto

# 代码块增强：复制按钮 + 行号（与 Hexo 自身高亮无关，属于主题侧展示）
code:
  copy_btn: true
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"

# 本地搜索（如果你后续改用其他搜索插件/方案，记得把这里关掉，避免生成多余索引）
search:
  enable: true

# 导航栏
navbar:
  blog_title: "药吖"

# 自定义样式
custom_css:
  - /css/custom.css

# 关于页信息
about:
  banner_img: /img/home-banner.png
  avatar: /img/yaoya-avatar.png
  name: "药吖"
  introduce: ""
  intro: ""
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/yyw-2006", tip: "GitHub" }

post:
  banner_img: /img/home-banner.png
  math:
    enable: true
    specific: true
    engine: katex

archive:
  banner_img: /img/home-banner.png

category:
  banner_img: /img/home-banner.png

tag:
  banner_img: /img/home-banner.png

page:
  banner_img: /img/home-banner.png

page404:
  banner_img: /img/home-banner.png

links:
  banner_img: /img/home-banner.png

#首页文本
index:
  banner_img: /img/home-banner.png
  slogan:
    text: "保持好奇，保持热爱"

# 页脚
footer:
  content: ""
